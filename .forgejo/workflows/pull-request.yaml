---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Validate Pull Request

on:
  merge_group:
  pull_request:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.set-fallback.outputs.changed_files || steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get changed files
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        id: changed-files
        with:
          path: apps
          include_only_directories: true
          max_depth: 1

      - name: Set fallback for empty changes
        id: set-fallback
        if: ${{ steps.changed-files.outputs.changed_files == '[]' }}
        run: |
          echo "changed_files=[\"__skip__\"]" >> "${FORGEJO_OUTPUT}"

  build:
    if: ${{ needs.prepare.outputs.changed-files != '[]' }}
    name: Build and test
    needs:
      - prepare
    runs-on: docker
    strategy:
      matrix:
        app: ${{ fromJSON(needs.prepare.outputs.changed-files) }}
      fail-fast: false
      max-parallel: 2
    steps:
      - name: Check for skip
        run: |
          if [ "${{ matrix.app }}" = "__skip__" ]; then
            echo "No apps changed, skipping build"
            exit 0
          fi

      - name: Checkout
        if: ${{ matrix.app != '__skip__' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ matrix.app != '__skip__' }}
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Add include directory to build context
        if: ${{ matrix.app != '__skip__' }}
        run: |-
          rsync -a --ignore-existing --progress ./include/ ./apps/${{ matrix.app }}/

      - name: Build multi-platform image
        if: ${{ matrix.app != '__skip__' }}
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          load: false
          push: false
          files: ./docker-bake.hcl
          source: ./apps/${{ matrix.app }}
          targets: image-all
        env:
          GIT_SHA: ${{ github.sha }}

      - name: Build image for testing
        if: ${{ matrix.app != '__skip__' }}
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        id: bake
        with:
          load: true
          push: false
          files: ./docker-bake.hcl
          source: ./apps/${{ matrix.app }}
          targets: image-local
        env:
          GIT_SHA: ${{ github.sha }}

      - name: Set up Go
        if: ${{ matrix.app != '__skip__' }}
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run Tests
        if: ${{ matrix.app != '__skip__' }}
        shell: bash
        env:
          APP: ${{ matrix.app }}
          TESTCONTAINERS_RYUK_DISABLED: "true"
          TEST_IMAGE: ${{ matrix.app }}@${{ fromJSON(steps.bake.outputs.metadata)['image-local']['containerimage.digest'] }}
        run: |-
          echo "Running tests against ${TEST_IMAGE}"
          go test -v ./apps/${APP}/...

  build-success:
    needs:
      - build
    if: ${{ !cancelled() }}
    name: Build and test - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !contains(needs.*.result, 'failure') }}
        run: echo "All jobs passed or skipped"
